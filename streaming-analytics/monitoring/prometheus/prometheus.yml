global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: kafka
    static_configs:
      - targets: ["kafka:9101"]

  - job_name: spark
    metrics_path: /metrics/prometheus/
    static_configs:
      - targets: ["spark:8080"]

  - job_name: spark-worker
    metrics_path: /metrics/prometheus/
    static_configs:
      - targets: ["spark-worker:8081"]
